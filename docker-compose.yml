services:
  postgres:
    image: postgres:16
    container_name: refline-postgres
    environment:
      POSTGRES_DB: refline_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - refline-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d refline_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  refline-api:
    container_name: refline-api
    build:
      context: "./ReflineApp(API)/Refline.Api"
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=refline_db;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  refline-postgres-data:
